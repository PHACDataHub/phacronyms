<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHACronyms - acronyms we use at the Public Health Agency of Canada</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- Icons Font Awesome (to access icons, import Font Awesome) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        crossorigin="anonymous">

    <link rel="icon" type="image/x-icon" sizes="96x96" href="favicon.ico">
    <link rel="stylesheet" href="custom.css">


    <!-- GC Design System -->
    <link rel="stylesheet"
        href="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-components@latest/dist/gcds/gcds.css">
    <script type="module"
        src="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-components@latest/dist/gcds/gcds.esm.js"></script>
    <script nomodule
        src="https://cdn.design-system.alpha.canada.ca/@cdssnc/gcds-components@latest/dist/gcds/gcds.js"></script>

    <!-- fuse search thing -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>

    <!-- dataTables stuff -->

    <script src="https://code.jquery.com/jquery-3.5.1.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/2.0.5/css/dataTables.dataTables.css" />
    <script src="https://cdn.datatables.net/2.0.5/js/dataTables.js"></script>

</head>

<body>
    <div id="prototype">This is a prototype</div>

    <div class="content-wrapper">

        <main id="mc" class="general-layout">

            <section>
                <article class="h1-dark text-light">
                    <div class="container-xl mx-auto">
                        <h1 class="mb-400">
                            PHACronyms
                        </h1>
                        <p>This a work in progress. Please share and contribute by adding new acronyms to this <a
                                href="https://022gc.sharepoint.com/:l:/s/InformationManagement-DataManagementServicesPeopleandculture/FMqEnjlJOkVHv4f8gGzKl94BMPqawVFjzdPR_3AifMIDVA?e=ozD4Za">sharepoint
                                list</a>.</p>
                        <p><a href="https://github.com/PHACDataHub/phacronyms">See project info</a>.</p>
                    </div>
                </article>
            </section>

            <section>
                <article class="py-450">
                    <div class="container-xl mx-auto">
                        <input type="text" id="fuseSearch" class="form-control form-control-lg mb-5"
                            placeholder="Search acronyms…" autocomplete="off">
                        <ul id="fuseResults" class="list-group mb-4" style="display:none;"></ul>
                    </div>
                </article>
            </section>



            <section class="bt-sm mt-500">


                <article class="py-450">
                    <div class="container-xl mx-auto">
                        <gcds-button button-role="secondary" button-id="browse" size="small" name="browse">
                            <a class="link-light" href="#" data-toggle="collapse" data-target="#browse">Browse
                                acronyms</a>
                        </gcds-button>

                        <div id="browse" class="collapse">
                            <!-- this is the HTML for the datables table -->
                            <table id="phacronymTable" class="table table-striped" style="width:100%">
                                <thead>
                                    <tr>
                                        <th>acronym</th>
                                        <th>definition</th>
                                    </tr>
                                </thead>
                                <tbody>
                                </tbody>
                            </table>
                        </div>
                </article>
    </div>
    </section>
    </main>
    </div>

    <script src="scripts.js"></script>
    <script src="search-highlight.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>

</html>
